[build]
  publish = "."

# Ensure Netlify processes HTML forms
[build.processing]
  skip_processing = false

# Pretty URLs: serve /success → /success.html
[[redirects]]
  from = "/success"
  to = "/success.html"
  status = 200

# Also handle /register → /register.html
[[redirects]]
  from = "/register"
  to = "/register.html"
  status = 200

# Security headers (removed X-Frame-Options DENY — breaks some Netlify success redirects)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Prevent admin page from being indexed
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
