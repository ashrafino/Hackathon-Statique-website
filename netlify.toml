[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

# Ensure Netlify processes HTML forms
[build.processing]
  skip_processing = false

# Pretty URL rewrites so /register and /success work without .html
[[redirects]]
  from = "/register"
  to = "/register.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# No-index for admin
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
