<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Received — Vibe Coding Hackathon</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: #050811; color: #e8eaf2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #0d1425; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 3rem 2.5rem; max-width: 520px; width: 100%; text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; background: linear-gradient(135deg, #6c63ff, #00d4aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    p { color: #7b84a3; line-height: 1.7; margin-bottom: 2rem; }
    a { display: inline-block; background: linear-gradient(135deg, #6c63ff, #8b83ff); color: #fff; padding: 0.85rem 2rem; border-radius: 100px; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Application Received!</h1>
    <p>Thank you for applying to the <strong style="color:#e8eaf2">Vibe Coding & FinTech Hackathon</strong>.<br />We'll review your application and send a confirmation to your email within 48 hours.</p>
    <a href="index.html">Back to Website</a>
  </div>
</body>
</html>
